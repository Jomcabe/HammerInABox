<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUBBER | Hackathon Project</title>
    <style>
        /* Base Reset & Fonts */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial Black', Impact, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            overflow-x: hidden;
        }

        /* Top Navigation Bar */
        nav {
            background-color: #d11212; /* Spicy Red */
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid #000;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-links a:hover {
            color: #fde047;
        }
        .logo {
            font-size: 1.8rem;
            font-style: italic;
            text-shadow: 2px 2px 0 #000;
        }

        /* Main Hero Section with Angled Yellow Banner */
        .hero-container {
            position: relative;
            width: 100%;
            height: 80vh;
            background-color: #d11212;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The dynamic angled background */
        .angled-bg {
            position: absolute;
            top: 10%;
            left: -10%;
            width: 120%;
            height: 100%;
            background-color: #ffe600; /* Electric Yellow */
            transform: rotate(-3deg);
            border-top: 8px solid #000;
            border-bottom: 8px solid #000;
            z-index: 1;
        }

        /* Starburst sticker effect */
        .burst-sticker {
            position: absolute;
            top: 15%;
            left: 20%;
            background-color: #ff5e00;
            color: #fff;
            padding: 20px;
            font-size: 2rem;
            transform: rotate(-15deg);
            border: 4px solid #000;
            box-shadow: 6px 6px 0 #000;
            z-index: 3;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            line-height: 1;
        }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #000;
            max-width: 900px;
            padding: 20px;
        }
        
        .hero-title {
            font-size: 7rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 
                -4px -4px 0 #000,  
                 4px -4px 0 #000,
                -4px  4px 0 #000,
                 4px  4px 0 #000,
                 8px  8px 0 #000; /* Thick drop shadow */
            letter-spacing: 2px;
            margin-bottom: -10px;
            transform: scaleY(1.1) rotate(-2deg);
        }

        .hero-subtitle {
            font-size: 2.5rem;
            color: #ff5e00;
            background-color: #000;
            display: inline-block;
            padding: 5px 15px;
            transform: rotate(-2deg);
            margin-bottom: 30px;
        }

        /* Bold Call to Action Button */
        .cta-button {
            display: inline-block;
            background-color: #d11212;
            color: #fff;
            font-size: 1.8rem;
            padding: 15px 40px;
            text-decoration: none;
            border: 4px solid #000;
            box-shadow: 6px 6px 0 #000;
            transition: all 0.1s ease;
            cursor: pointer;
            text-transform: uppercase;
        }
        .cta-button:active {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #000;
        }

        /* Placeholder for a mascot or tech element */
        .tech-graphic {
            position: absolute;
            bottom: -20px;
            left: 5%;
            font-size: 10rem;
            z-index: 4;
            filter: drop-shadow(5px 5px 0px #000);
            transform: rotate(10deg);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GUBBER.US</div>
        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">Documentation</a>
            <a href="#">GitHub Repo</a>
        </div>
    </nav>

    <header class="hero-container">
        <div class="angled-bg"></div>
        <div class="burst-sticker">ZERO<br>DAY!</div>
        
        <div class="tech-graphic">💻</div> <div class="hero-content">
            <h1 class="hero-title">GUBBER</h1>
            <h2 class="hero-subtitle">NEXT-GEN ETHICAL HACKING TOOLKIT</h2>
            <br>
            <a href="#" class="cta-button">PULL REPO NOW</a>
        </div>
    </header>

</body>
</html>
